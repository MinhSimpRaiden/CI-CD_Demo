name: Performance and Visual Regression Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  performance-visual-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm.cmd ci

      - name: Install Playwright Chromium
        run: npx.cmd playwright install chromium

      - name: Run Maven tests
        run: .\mvnw.cmd clean test

      - name: Package application
        run: .\mvnw.cmd -DskipTests package

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run performance and visual regression tests
        shell: pwsh
        env:
          BASE_URL: http://localhost:8080
        run: |
          $artifact = Get-ChildItem -Path "target" -Filter "*.war" | Select-Object -First 1
          if (-not $artifact) {
            throw "No WAR artifact found in target."
          }

          $process = Start-Process -FilePath "java" -ArgumentList "-jar", $artifact.FullName -PassThru -RedirectStandardOutput app.log -RedirectStandardError app-error.log
          try {
            $ready = $false
            for ($i = 0; $i -lt 60; $i++) {
              if ($process.HasExited) {
                Get-Content app.log -ErrorAction SilentlyContinue
                Get-Content app-error.log -ErrorAction SilentlyContinue
                throw "Spring Boot application exited before it became ready."
              }

              try {
                $response = Invoke-WebRequest -Uri $env:BASE_URL -UseBasicParsing -TimeoutSec 2
                if ($response.StatusCode -eq 200) {
                  Write-Host "Spring Boot application is running on $env:BASE_URL."
                  $ready = $true
                  break
                }
              } catch {
                Write-Host "Waiting for Spring Boot application..."
                Start-Sleep -Seconds 2
              }
            }

            if (-not $ready) {
              Get-Content app.log -ErrorAction SilentlyContinue
              Get-Content app-error.log -ErrorAction SilentlyContinue
              throw "Spring Boot application failed to start."
            }

            Start-Sleep -Seconds 5
            k6 run performance/load-test.js
            if ($LASTEXITCODE -ne 0) {
              throw "k6 performance test failed with exit code $LASTEXITCODE."
            }

            npm.cmd run test:visual
            if ($LASTEXITCODE -ne 0) {
              throw "Playwright visual regression test failed with exit code $LASTEXITCODE."
            }
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs
          path: |
            app.log
            app-error.log
          if-no-files-found: ignore
