name: Performance Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Performance Tests
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Spring Boot Application
      run: .\mvnw.cmd clean package -DskipTests

    - name: Start Spring Boot Application
      run: |
        $warFile = Get-ChildItem -Path target/*.war | Select-Object -First 1
        Start-Process -FilePath "java" -ArgumentList "-jar", $warFile.FullName -NoNewWindow -PassThru
        Write-Host "Waiting for Spring Boot to start..."
        Start-Sleep -Seconds 15

    - name: Install k6
      run: choco install k6 -y

    - name: Run k6 Performance Test
      run: k6 run performance/load-test.js
