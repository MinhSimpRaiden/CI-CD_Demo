name: Performance and Visual Regression Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  performance-visual-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm.cmd ci

      - name: Install Playwright Chromium
        run: npx.cmd playwright install chromium

      - name: Run Maven tests
        run: .\mvnw.cmd clean test

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Start Spring Boot application
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ".\mvnw.cmd" -ArgumentList "spring-boot:run" -PassThru -RedirectStandardOutput app.log -RedirectStandardError app-error.log
          "APP_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          for ($i = 0; $i -lt 60; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080" -UseBasicParsing -TimeoutSec 2
              if ($response.StatusCode -eq 200) {
                Write-Host "Spring Boot application is running on port 8080."
                Start-Sleep -Seconds 5
                exit 0
              }
            } catch {
              Write-Host "Waiting for Spring Boot application..."
              Start-Sleep -Seconds 2
            }
          }

          Write-Host "Spring Boot application failed to start."
          Get-Content app.log
          Get-Content app-error.log
          exit 1

      - name: Run performance test with k6
        env:
          BASE_URL: http://localhost:8080
        run: k6 run performance/load-test.js

      - name: Run visual regression test with Playwright
        env:
          BASE_URL: http://localhost:8080
        run: npm.cmd run test:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs
          path: |
            app.log
            app-error.log
          if-no-files-found: ignore

      - name: Stop Spring Boot application
        if: always()
        shell: pwsh
        run: |
          if ($env:APP_PID) {
            Stop-Process -Id $env:APP_PID -Force -ErrorAction SilentlyContinue
          }
