name: Visual Regression Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Visual Tests
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Spring Boot Application
      run: .\mvnw.cmd clean package -DskipTests

    - name: Start Spring Boot Application
      run: |
        $warFile = Get-ChildItem -Path target/*.war | Select-Object -First 1
        Start-Process -FilePath "java" -ArgumentList "-jar", $warFile.FullName -NoNewWindow -PassThru
        Write-Host "Waiting for Spring Boot to start..."
        Start-Sleep -Seconds 15

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright Visual Test
      run: npx playwright test tests/visual.spec.js --project=chromium

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-visual-report
        path: playwright-report/
        retention-days: 14
