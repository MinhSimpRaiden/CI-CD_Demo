name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm.cmd ci

      - name: Install Playwright Chromium
        run: npx.cmd playwright install chromium

      - name: Run Maven tests
        run: .\mvnw.cmd clean test

      - name: Start application
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ".\mvnw.cmd" -ArgumentList "spring-boot:run" -PassThru -RedirectStandardOutput app.log -RedirectStandardError app.err
          "APP_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $deadline = (Get-Date).AddSeconds(90)
          do {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) { exit 0 }
            } catch {
              Start-Sleep -Seconds 3
            }
          } while ((Get-Date) -lt $deadline)

          Get-Content app.log -ErrorAction SilentlyContinue
          Get-Content app.err -ErrorAction SilentlyContinue
          throw "Application did not become ready on http://localhost:8080"

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 performance test
        env:
          BASE_URL: http://localhost:8080
        run: k6 run performance/load-test.js

      - name: Run visual regression test
        env:
          BASE_URL: http://localhost:8080
        run: npm.cmd run test:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload app logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: |
            app.log
            app.err
          if-no-files-found: ignore

      - name: Stop application
        if: always()
        shell: pwsh
        run: |
          if ($env:APP_PID) {
            Stop-Process -Id $env:APP_PID -Force -ErrorAction SilentlyContinue
          }
