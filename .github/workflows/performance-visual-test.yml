name: Performance and Visual Regression Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  performance-visual-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Start Spring Boot application
        shell: pwsh
        run: |
          Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/c", "mvnw.cmd spring-boot:run" `
            -RedirectStandardOutput "app.log" `
            -RedirectStandardError "app-error.log"

          for ($i = 0; $i -lt 60; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080" -UseBasicParsing -TimeoutSec 2
              if ($response.StatusCode -eq 200) {
                Write-Host "Spring Boot application is running on port 8080."
                exit 0
              }
            } catch {
              Write-Host "Waiting for Spring Boot application..."
              Start-Sleep -Seconds 2
            }
          }

          Write-Host "Spring Boot application failed to start."
          Get-Content app.log
          Get-Content app-error.log
          exit 1

      - name: Run performance test with k6
        run: k6 run performance/load-test.js

      - name: Run visual regression test with Playwright
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs
          path: |
            app.log
            app-error.log